<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Effect (CSS Only)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            padding-left: 5%;
            overflow: hidden;
        }

        /* --- PHẦN NỀN GIẢ LẬP CANVAS (QUAN TRỌNG) --- */
        .gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #ffaa00; /* Màu nền gốc */
            
            /* Tạo nhiều lớp màu gradient */
            background-image: 
                radial-gradient(at 40% 20%, hsla(28,100%,74%,1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189,100%,56%,1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355,100%,93%,1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(340,100%,76%,1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22,100%,77%,1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(242,100%,70%,1) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(343,100%,76%,1) 0px, transparent 50%);
            
            /* Kích thước nền cực lớn để di chuyển */
            background-size: 150% 150%;
            
            /* Gọi animation */
            animation: gradient-animation 15s ease infinite;
        }

        /* Định nghĩa chuyển động */
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- PHẦN CHỮ --- */
        h1.hero-text {
            color: #0a0a0a;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            position: relative;
            z-index: 1;
            mix-blend-mode: overlay; /* Hoà trộn nhẹ vào nền để trông thật hơn */
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="gradient-bg"></div>
        
        <h1 class="hero-text">
            Financial<br>
            infrastructure<br>
            to grow your<br>
            revenue
        </h1>
    </div>

</body>
</html>
