<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #ffffff;
            margin: 0;
            text-align: center;
        }
        .header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 20px;
        }
        .toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00c6ff;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
        }
        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #666680;
        }
    </style>
</head>
<body>
    <div class="header">Note8 Unblur</div>
    <div class="status">Extension is Active</div>
    <button class="toggle-btn" id="refreshBtn">Refresh Page</button>
    <div class="footer">Created by Antigravity</div>
    <script src="popup.js"></script>
</body>
</html>
