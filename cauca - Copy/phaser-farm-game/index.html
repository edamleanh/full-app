<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FarmVille-style pixel art farming game built with Phaser.js 3" />
    <title>🌾 Farm Valley – Pixel Farming Game</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
